<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Tales Lanches</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1550547660-d9450f859349') no-repeat center;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay {
  background: rgba(0,0,0,0.85);
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  width: 92%;
  max-width: 420px;
  text-align: center;
}

/* LOGO TEXTO */
.logo-text {
  background: #000;
  color: #FFD700;
  padding: 20px;
  border-radius: 15px;
  font-size: 26px;
  font-weight: bold;
  margin-bottom: 15px;
  box-shadow: 0 0 20px rgba(255,215,0,0.6);
}

/* DESCRIÇÃO */
.desc {
  color: #ccc;
  margin-bottom: 15px;
}

/* PROMO */
.promo {
  background: linear-gradient(90deg, #FFD700, #ffae00);
  color: #000;
  padding: 14px;
  border-radius: 12px;
  font-weight: bold;
  margin-bottom: 18px;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.06); }
  100% { transform: scale(1); }
}

/* BOTÕES GRANDES */
.btn {
  display: flex;
  align-items: center;
  gap: 14px;
  background: #fff;
  color: #000;
  padding: 18px;
  margin: 12px 0;
  border-radius: 15px;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  transition: 0.25s;
}

.btn img {
  width: 32px;
}

.btn:hover {
  transform: scale(1.05);
}

/* WHATSAPP DESTAQUE */
.whatsapp {
  background: #25D366;
  color: #fff;
  animation: zap 1s infinite;
}

@keyframes zap {
  0% { box-shadow: 0 0 0px #25D366; }
  50% { box-shadow: 0 0 25px #25D366; }
  100% { box-shadow: 0 0 0px #25D366; }
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #aaa;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="container">

    <!-- LOGO TEXTO -->
    <div class="logo-text">
      🍔 Tales Lanches
    </div>

    <p class="desc">O lanche mais brabo da região 🔥</p>

    <div class="promo">
      💥 Promoções quase todos os dias! Fique de olho 👀
    </div>

    <!-- BOTÕES -->

    <a class="btn" onclick="playSound()" href="https://sl1nk.com/taleslanchescardapio" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
      Ver Cardápio
    </a>

    <a class="btn whatsapp" onclick="playSound()" href="https://wa.me/5514999060526?text=Olá,%20vim%20pelo%20Instagram%20e%20quero%20fazer%20um%20pedido!" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      Pedir no WhatsApp
    </a>

    <a class="btn" onclick="playSound()" href="https://aiqfome.com/SP/brotas/tales-lanches" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
      Pedir pelo App (AiqFome)
    </a>

    <a class="btn" onclick="playSound()" href="https://www.instagram.com/lanchestales" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
      Nosso Instagram
    </a>

    <div class="footer">
      © Tales Lanches
    </div>

  </div>
</div>

<!-- SOM -->
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<script>
function playSound() {
  document.getElementById("clickSound").play();
}
</script>

</body>
</html>
